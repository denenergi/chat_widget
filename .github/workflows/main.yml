name: CD

on:
  push:
    branches: [ "master" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
        with:
          token: ${{ secrets.PUSH_TOKEN }}

      - name: echo .env
        run: |
          echo "REACT_APP_SOCKET_URL=${{ secrets.REACT_APP_SOCKET_URL }}" >> .env; echo "" >> .env;
          echo "REACT_APP_BASE_DOMAIN_URL=${{ secrets.REACT_APP_BASE_DOMAIN_URL }}" >> .env; echo "" >> .env;
          echo "REACT_APP_JD_DOMAIN_URL=${{ secrets.REACT_APP_JD_DOMAIN_URL }}" >> .env; echo "" >> .env;

      - name: Set up Node
        uses: actions/setup-node@v1
        with:
          node-version: '14.x'
      - run: npm install
      - run: CI=false npm run build

      - name: Commit built assets
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git checkout -b deploy
          git add .
          git commit -m "Build front-end assets" --allow-empty
          git push -f origin deploy

      - name: Deploy to production
        uses: appleboy/ssh-action@master
        with:
          username: ${{ secrets.SSH_USERNAME }}
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: '
            cd /var/www/widget.jedidesk.com &&
            chmod 0755 server_deploy.sh &&
            ./server_deploy.sh'
