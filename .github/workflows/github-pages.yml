name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Create .env
        env:
          GIPHY_SECRET: ${{ secrets.REACT_APP_GIPHY_API_KEY }}
          GIPHY_VAR: ${{ vars.REACT_APP_GIPHY_API_KEY }}
        run: |
          echo "REACT_APP_SOCKET_URL=wss://app.jedidesk.com/wss" >> .env
          echo "REACT_APP_BASE_DOMAIN_URL=https://denenergi.github.io/chat_widget" >> .env
          echo "REACT_APP_JD_DOMAIN_URL=https://app.jedidesk.com/" >> .env
          echo "REACT_APP_JD_STATUS=prod" >> .env
          echo "REACT_APP_GIF_PROVIDER=giphy" >> .env

          if [ -f .env.github-pages ]; then
            cat .env.github-pages >> .env
          fi

          if [ -n "$GIPHY_SECRET" ]; then
            echo "REACT_APP_GIPHY_API_KEY=$GIPHY_SECRET" >> .env
          elif [ -n "$GIPHY_VAR" ]; then
            echo "REACT_APP_GIPHY_API_KEY=$GIPHY_VAR" >> .env
          fi

          if ! grep -q "^REACT_APP_GIPHY_API_KEY=.\+" .env; then
            echo "::error::REACT_APP_GIPHY_API_KEY is missing. Add .env.github-pages or a GitHub Actions secret/variable."
            exit 1
          fi

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build
        env:
          PUBLIC_URL: /chat_widget
          REACT_APP_ASSET_VERSION: ${{ github.sha }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
